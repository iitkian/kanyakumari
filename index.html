<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Classified GeoTIFF over Esri World Imagery Wayback tiles" />
  <title>Classified Raster Viewer</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="map" aria-label="Interactive map"></main>

  <aside class="panel" aria-live="polite">
    <h1>Classified raster</h1>
    <p class="hint">Click anywhere on the map to inspect its coordinates.</p>

    <label for="opacity">Overlay opacity <span id="opacity-value">75%</span></label>
    <input id="opacity" type="range" min="0" max="1" value="0.75" step="0.05" />

    <section class="coordinates">
      <div><span>Latitude</span><strong id="latitude">—</strong></div>
      <div><span>Longitude</span><strong id="longitude">—</strong></div>
      <div><span>UTM Easting</span><strong id="easting">—</strong></div>
      <div><span>UTM Northing</span><strong id="northing">—</strong></div>
      <small>WGS 84 / UTM zone 43N (EPSG:32643)</small>
    </section>

    <div id="status" class="status">Loading overlay…</div>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/proj4@2.12.1/dist/proj4.js"></script>
  <script src="app.js"></script>
</body>
</html>
